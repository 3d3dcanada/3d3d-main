<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 3D3D Animated favicon - loops through 3D3D_ -->
  <rect width="32" height="32" rx="6" fill="#111214"/>
  
  <defs>
    <linearGradient id="g3d" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#40C4C4"/>
      <stop offset="100%" stop-color="#E040FB"/>
    </linearGradient>
    
    <style>
      .text-display {
        font-family: 'Impact', 'Arial Black', sans-serif;
        font-size: 11px;
        font-weight: 900;
        fill: url(#g3d);
        letter-spacing: -0.5px;
      }
      
      @keyframes cycle1 { 0%, 12.5% { opacity: 1; } 12.6%, 100% { opacity: 0; } }
      @keyframes cycle2 { 0%, 12.5% { opacity: 0; } 12.6%, 25% { opacity: 1; } 25.1%, 100% { opacity: 0; } }
      @keyframes cycle3 { 0%, 25% { opacity: 0; } 25.1%, 37.5% { opacity: 1; } 37.6%, 100% { opacity: 0; } }
      @keyframes cycle4 { 0%, 37.5% { opacity: 0; } 37.6%, 50% { opacity: 1; } 50.1%, 100% { opacity: 0; } }
      @keyframes cycle5 { 0%, 50% { opacity: 0; } 50.1%, 62.5% { opacity: 1; } 62.6%, 100% { opacity: 0; } }
      @keyframes cycle6 { 0%, 62.5% { opacity: 0; } 62.6%, 75% { opacity: 1; } 75.1%, 100% { opacity: 0; } }
      @keyframes cycle7 { 0%, 75% { opacity: 0; } 75.1%, 87.5% { opacity: 1; } 87.6%, 100% { opacity: 0; } }
      @keyframes cycle8 { 0%, 87.5% { opacity: 0; } 87.6%, 100% { opacity: 1; } }
      
      .frame1 { animation: cycle1 2s steps(1) infinite; }
      .frame2 { animation: cycle2 2s steps(1) infinite; }
      .frame3 { animation: cycle3 2s steps(1) infinite; }
      .frame4 { animation: cycle4 2s steps(1) infinite; }
      .frame5 { animation: cycle5 2s steps(1) infinite; }
      .frame6 { animation: cycle6 2s steps(1) infinite; }
      .frame7 { animation: cycle7 2s steps(1) infinite; }
      .frame8 { animation: cycle8 2s steps(1) infinite; }
    </style>
  </defs>
  
  <!-- Frame 1: 3 -->
  <text x="16" y="21" text-anchor="middle" class="text-display frame1">3</text>
  
  <!-- Frame 2: 3D -->
  <text x="16" y="21" text-anchor="middle" class="text-display frame2">3D</text>
  
  <!-- Frame 3: 3D3 -->
  <text x="16" y="21" text-anchor="middle" class="text-display frame3">3D3</text>
  
  <!-- Frame 4: 3D3D -->
  <text x="16" y="21" text-anchor="middle" class="text-display frame4">3D3D</text>
  
  <!-- Frame 5: 3D3D_ -->
  <text x="16" y="21" text-anchor="middle" class="text-display frame5">3D3D_</text>
  
  <!-- Frame 6: 3D3D -->
  <text x="16" y="21" text-anchor="middle" class="text-display frame6">3D3D</text>
  
  <!-- Frame 7: 3D3 -->
  <text x="16" y="21" text-anchor="middle" class="text-display frame7">3D3</text>
  
  <!-- Frame 8: 3D -->
  <text x="16" y="21" text-anchor="middle" class="text-display frame8">3D</text>
  
  <!-- Teal accent bar -->
  <rect x="6" y="26" width="20" height="2" rx="1" fill="#40C4C4"/>
</svg>