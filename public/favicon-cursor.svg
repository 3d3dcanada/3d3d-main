<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 3D3D favicon with blinking cursor -->
  <rect width="32" height="32" rx="6" fill="#111214"/>
  
  <defs>
    <linearGradient id="g3d" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#40C4C4"/>
      <stop offset="100%" stop-color="#E040FB"/>
    </linearGradient>
    
    <style>
      .brand-text {
        font-family: 'Impact', 'Arial Black', sans-serif;
        font-size: 12px;
        font-weight: 900;
        fill: url(#g3d);
        letter-spacing: 0px;
      }
      
      .cursor {
        font-family: 'Impact', 'Arial Black', sans-serif;
        font-size: 12px;
        font-weight: 900;
        fill: #40C4C4;
      }
      
      @keyframes blink {
        0%, 45% { opacity: 1; }
        50%, 95% { opacity: 0; }
        100% { opacity: 1; }
      }
      
      .cursor { animation: blink 1s steps(1) infinite; }
    </style>
  </defs>
  
  <!-- 3D3D text -->
  <text x="5" y="21" class="brand-text">3D3D</text>
  
  <!-- Blinking cursor/underscore -->
  <text x="47" y="21" class="cursor">_</text>
  
  <!-- Teal accent bar -->
  <rect x="6" y="26" width="20" height="2" rx="1" fill="#40C4C4"/>
</svg>