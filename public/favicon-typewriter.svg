<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 3D3D Typewriter effect favicon -->
  <rect width="32" height="32" rx="6" fill="#111214"/>
  
  <defs>
    <linearGradient id="g3d" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#40C4C4"/>
      <stop offset="100%" stop-color="#E040FB"/>
    </linearGradient>
    
    <style>
      .brand-text {
        font-family: 'Impact', 'Arial Black', sans-serif;
        font-size: 13px;
        font-weight: 900;
        fill: url(#g3d);
      }
      
      .cursor-bar {
        fill: #40C4C4;
      }
      
      /* Typewriter sequence: 3_ 3D_ 3D3_ 3D3D_ (pause) 3D3D (cursor off) */
      @keyframes cursor-blink {
        0%, 40% { opacity: 1; }
        45%, 55% { opacity: 0; }
        60%, 100% { opacity: 1; }
      }
      
      @keyframes frame1 { 0%, 10% { opacity: 1; } 10.01%, 100% { opacity: 0; } }
      @keyframes frame2 { 0%, 10% { opacity: 0; } 10.01%, 20% { opacity: 1; } 20.01%, 100% { opacity: 0; } }
      @keyframes frame3 { 0%, 20% { opacity: 0; } 20.01%, 30% { opacity: 1; } 30.01%, 100% { opacity: 0; } }
      @keyframes frame4 { 0%, 30% { opacity: 0; } 30.01%, 55% { opacity: 1; } 55.01%, 100% { opacity: 0; } }
      @keyframes frame5 { 0%, 55% { opacity: 0; } 55.01%, 65% { opacity: 1; } 65.01%, 100% { opacity: 0; } }
      @keyframes frame6 { 0%, 65% { opacity: 0; } 65.01%, 75% { opacity: 1; } 75.01%, 100% { opacity: 0; } }
      @keyframes frame7 { 0%, 75% { opacity: 0; } 75.01%, 85% { opacity: 1; } 85.01%, 100% { opacity: 0; } }
      @keyframes frame8 { 0%, 85% { opacity: 0; } 85.01%, 100% { opacity: 1; } }
      
      .f1 { animation: frame1 2s steps(1) infinite; }
      .f2 { animation: frame2 2s steps(1) infinite; }
      .f3 { animation: frame3 2s steps(1) infinite; }
      .f4 { animation: frame4 2s steps(1) infinite; }
      .f5 { animation: frame5 2s steps(1) infinite; }
      .f6 { animation: frame6 2s steps(1) infinite; }
      .f7 { animation: frame7 2s steps(1) infinite; }
      .f8 { animation: frame8 2s steps(1) infinite; }
    </style>
  </defs>
  
  <!-- Typing out -->
  <text x="6" y="20" class="brand-text f1">3</text>
  <text x="6" y="20" class="brand-text f2">3D</text>
  <text x="6" y="20" class="brand-text f3">3D3</text>
  <text x="6" y="20" class="brand-text f4">3D3D</text>
  
  <!-- Deleting back -->
  <text x="6" y="20" class="brand-text f5">3D3</text>
  <text x="6" y="20" class="brand-text f6">3D</text>
  <text x="6" y="20" class="brand-text f7">3</text>
  <text x="6" y="20" class="brand-text f8"></text>
  
  <!-- Teal accent bar -->
  <rect x="6" y="26" width="20" height="2" rx="1" fill="#40C4C4"/>
</svg>