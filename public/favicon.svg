<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#111214"/>

  <!-- Isometric cube — centered, fills the space properly -->
  <!-- Top face -->
  <polygon points="16,5 27,11 16,17 5,11" fill="#40C4C4"/>
  <!-- Left face -->
  <polygon points="5,11 16,17 16,27 5,21" fill="#1D9A9A"/>
  <!-- Right face -->
  <polygon points="27,11 16,17 16,27 27,21" fill="#2BB0B0"/>

  <!-- Edge highlights for crispness -->
  <polyline points="5,11 16,5 27,11" fill="none" stroke="#62D8D8" stroke-width="0.8" stroke-linejoin="round"/>
  <line x1="16" y1="5" x2="16" y2="17" stroke="#62D8D8" stroke-width="0.6" opacity="0.6"/>
</svg>
