<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" aria-label="Prusa Research">
  <!-- 
    Prusa Research Wordmark for 3D3D Platform
    
    Based on official Prusa Research branding from prusa3d.com
    Orange (#FA6831) is the brand color.
    
    This version is optimized for timeline card display and includes
    the distinctive Prusa P mark (the geometric letter shape) plus
    the PRUSA and RESEARCH wordmarks.
  -->
  <defs>
    <style>
      .prusa-text { font-family: 'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 900; }
    </style>
  </defs>
  
  <!-- The distinctive Prusa P mark (from official logo path) -->
  <g transform="translate(0, 5) scale(0.6)">
    <path d="M44.03 18.08c3.57 0 6.61.52 9.12 1.56 2.51 1.04 4.55 2.41 6.12 4.12 1.57 1.71 2.72 3.65 3.44 5.84.72 2.19 1.08 4.45 1.08 6.8 0 2.29-.36 4.55-1.08 6.76-.72 2.21-1.87 4.17-3.44 5.88-1.57 1.71-3.61 3.08-6.12 4.12-2.51 1.04-5.55 1.56-9.12 1.56h-13.2V75.2H18.27V18.08h25.76zm-3.44 26.88c1.44 0 2.83-.11 4.16-.32 1.33-.21 2.51-.63 3.52-1.24 1.01-.61 1.83-1.48 2.44-2.6.61-1.12.92-2.59.92-4.4 0-1.81-.31-3.28-.92-4.4-.61-1.12-1.43-1.99-2.44-2.6-1.01-.61-2.19-1.03-3.52-1.24-1.33-.21-2.72-.32-4.16-.32h-9.76v17.12h9.76z" fill="#FA6831"/>
  </g>
  
  <!-- PRUSA wordmark -->
  <text x="48" y="38" class="prusa-text" font-size="28" letter-spacing="0.05em" fill="currentColor">PRUSA</text>
  
  <!-- RESEARCH wordmark -->
  <text x="49" y="52" class="prusa-text" font-size="10" font-weight="500" letter-spacing="0.2em" fill="currentColor" opacity="0.65">RESEARCH</text>
</svg>
